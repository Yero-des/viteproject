{% extends "base.html" %}
{% load static %}

{% block content %}

  <div class="container justify-content-center d-flex gap-4 mt-5">
    <div class="container shadow shadow-md p-3 rounded">
      
      <form method="post" enctype="multipart/form-data" class="d-flex flex-column justify-content-center">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="btn btn-primary">{{"Subir saludo"|upper}}</button>        
      </form>

    </div>
  </div>

{% endblock content %}
